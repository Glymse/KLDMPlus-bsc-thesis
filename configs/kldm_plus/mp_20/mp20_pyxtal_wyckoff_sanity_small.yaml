experiment_name: plus_mp20_pyxtal_wyckoff_sanity_small

dataset:
  task: csp
  name: mp20
  lattice_representation: kldm
  root: null
  batch_size: 1
  num_workers: 0
  pin_memory: false

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  lattice_diffusion_type: VP
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: false
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 8193
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

pyxtal_wyckoff_sanity:
  split: test
  batch_size: 1
  num_targets: 20
  subset_seed: 123
  sample_seed: 2026
  symprec: 1.0e-2
  pyxtal_tol: 1.0e-2
