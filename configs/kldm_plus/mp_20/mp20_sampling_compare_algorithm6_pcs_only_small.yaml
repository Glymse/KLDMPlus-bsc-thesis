experiment_name: plus_mp20_sampling_compare_kldm_dpnp_sg_small

dataset:
  task: csp
  name: mp20
  lattice_representation: kldm
  root: null
  batch_size: 5
  num_workers: 0
  pin_memory: false

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  lattice_diffusion_type: VP
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: false
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 8193
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

sampling_compare:
  checkpoint_path: ../../../artifacts/HPC/checkpoints/epoch_8900.pt
  split: test
  batch_size: 4
  num_targets: 4
  subset_seed: 1222
  sample_seed: 2026
  validity_cutoff: 1.0
  debug_diagnostics: true
  debug_matcher: true

  samplers:
    - name: em_300
      method: em
      sampling_algorithm: 3
      n_steps: 500
      t_start: 1.0
      t_final: 1.0e-3

    - name: kldm_dpnp_sg
      method: em
      sampling_algorithm: 7
      n_steps: 500
      t_start: 1.0
      t_final: 1.0e-3
      sgdpnp:
        outer_steps: 2
        eta_start: 0.03
        eta_end: 0.012
        final_eta_scale: 1.0

        max_templates: 512
        template_eval_limit: 128
        template_num_sites_min: null
        template_num_sites_max: null
        quick_templates: false

        template_prior_weight: 3.0
        template_prior_max_samples: 8000
        template_prior_match_targets_only: true
        template_prior_cache: true

        template_cache_path: artifacts/kldmPlus/wyckoff_template_cache_mp20.pkl
        template_cache_required: true
        template_ranker_path: artifacts/kldmPlus/wyckoff_template_ranker_mp20.pt
        template_ranker_weight: 3.0

        mala_steps: 48
        mala_step_size: 5.0e-5
        template_restarts: 3

        refine_steps: 200
        refine_top_k: 25
        refine_lr: 1.0e-2

        branch_temperature: 0.0

        coord_weight: 3.0
        lattice_weight: 0.5
        steric_weight: 50.0
        min_distance: 1.0
        volume_weight: 2.0

        dds_steps: 0

        symprec: 1.0e-2
        angle_tolerance: 5.0
        initial_pcs: true
        debug: true
