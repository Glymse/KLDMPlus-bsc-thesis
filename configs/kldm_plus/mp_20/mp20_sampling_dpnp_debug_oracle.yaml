experiment_name: mp20_sampling_dpnp_debug_oracle

dataset:
  task: csp
  name: mp20
  lattice_representation: kldm
  root: null
  batch_size: 5
  num_workers: 0
  pin_memory: false

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  lattice_diffusion_type: VP
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: false
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 8193
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true
    sg_conditional: true
    sg_emb_dim: 128
    num_space_groups: 230

sampling_compare:
  checkpoint_path: ../../../artifacts/HPC/checkpoints/epoch_8900.pt
  split: test
  batch_size: 2
  num_targets: 2
  subset_seed: 1222
  sample_seed: 2026
  validity_cutoff: 1.0
  debug_diagnostics: true
  debug_matcher: true

  samplers:
    - name: DPnPSVD
      method: em
      sampling_algorithm: 8
      n_steps: 1000
      t_start: 1.0
      t_final: 1.0e-3
      dpnpsvd:
        faithful_dpnp: true
        outer_steps: 4
        eta_start: 0.06
        eta_end: 0.012

        pcs_mh_steps: 300
        final_pcs_mh_steps: 500
        final_fixed_template_refine: false

        template_proposal_temperature: 0.75
        template_proposal_epsilon: 0.05
        template_move_probability: 0.1
        optimization_steps: 300
        learning_rate: 1.0e-2

        svd_step_size: 2.0e-5
        svd_damping: 2.0e-1

        coord_weight: 3.0
        lattice_weight: 10.0
        residual_volume_weight: 1.0
        steric_weight: 40
        pair_distance_weight: 0.0
        volume_weight: 2.0
        outer_hard_reject_distance_ratio: 1.0

        theta_proposal_free_std: 0.03
        theta_proposal_lattice_std: 0.03

        oracle_template_orbit_rerank: false
        oracle_template_orbit_filter: false
        template_prior_mode: oracle_surrogate
        oracle_template_prior_success_prob: 0.95
        template_prior_weight: 1.0

        ambient_dds_steps: 150
        ambient_dds_t_final: 1.0e-3
        ambient_dds_velocity_steps: 50
        ambient_dds_velocity_step_size: 5.0e-5
        sg_conditioned_dds: false
        sg_guidance_scale: 1.0

        steric_softplus_tau: 0.1
        template_init_restarts: 12
        debug_fixed_template_multistart_restarts: 0
        debug_fixed_template_multistart_steps: 0
        debug_fixed_template_multistart_eta: 0.0
        debug: true
        debug_best_phase_metrics: true
