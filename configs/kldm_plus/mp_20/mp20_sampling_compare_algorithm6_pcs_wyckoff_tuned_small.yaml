experiment_name: plus_mp20_sampling_compare_algorithm6_pcs_wyckoff_tuned_small

dataset:
  task: csp
  name: mp20
  lattice_representation: kldm
  root: null
  batch_size: 5
  num_workers: 0
  pin_memory: false

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  lattice_diffusion_type: VP
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: false
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 8193
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

sampling_compare:
  checkpoint_path: ../../../artifacts/HPC/checkpoints/epoch_8900.pt
  split: test
  batch_size: 4
  num_targets: 4
  subset_seed: 1222
  sample_seed: 2026
  validity_cutoff: 1.0
  debug_diagnostics: true
  debug_matcher: true
  samplers:
    - name: em_300
      method: em
      sampling_algorithm: 3
      n_steps: 500
      t_start: 1.0
      t_final: 1e-3
    - name: pcs_wyckoff_tuned_algorithm6_600
      method: em
      sampling_algorithm: 6
      n_steps: 500
      t_start: 1.0
      t_final: 1e-3
      pcs:
        standardization: conventional
        symprec: 5.0e-3
        angle_tolerance: 2.0
        max_templates: 128
        template_eval_limit: 12
        template_prior_max_samples: 500
        template_prior_weight: 1.0
        optimization_steps: 50
        learning_rate: 5.0e-2
        coord_weight: 1.0
        lattice_weight: 0.05
        pairdist_weight: 0.35
        pairdist_bins: 32
        pairdist_max_distance: 8.0
        pairdist_bandwidth: 0.25
        steric_weight: 4.0
        steric_min_distance: 1.0
        volume_weight: 1.0
        volume_ratio_min: 0.7
        volume_ratio_max: 1.3
        k6_weight: 0.25
        hard_min_distance: 1.0
        hard_volume_ratio_min: 0.6
        hard_volume_ratio_max: 1.5
        freeze_lattice: false
        quick_templates: false
        top_k_templates: 12
        debug_template_candidates: true
        oracle_template_orbit_rerank: false
        oracle_template_fit_target: false
        template_init_pairdist_weight: 0.25
        mala_steps: 5
        mala_step_size: 1.0e-3
        dds_repair: true
        dds_n_steps: 15
        dds_t_final: 1e-3
        outer_steps: 2
        outer_eta_start: 0.02
        outer_eta_end: 0.005
        outer_eta_k_start: 1
        outer_eta_rho: 1.0
        final_projection: true
        validate_requested_space_group: true
        return_last_pcs_on_validation_failure: true
