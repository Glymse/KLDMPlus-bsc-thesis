experiment_name: plus_mp20_diffcsp_k_x0_soft_lattice_laptop
sampler_config: ../../samplers/predictor_corrector.yaml

dataset:
  task: csp
  name: mp20
  lattice_representation: diffcsp_k
  root: null
  batch_size: 8
  num_workers: 0
  pin_memory: false
  train_subset_fraction: 0.05
  train_subset_seed: 2002

time_sampler:
  type: uniform

model:
  eps: 1.0e-6
  lattice_parameterization: x0
  lattice_diffusion_type: VP
  lattice_representation: diffcsp_k
  lattice_sg_lambda: 0.05
  lattice_sg_normalize: true
  wrapped_normal_K: 3
  tdm_n_sigmas: 512
  tdm_compute_sigma_norm: true
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 20
  tdm_sigma_norm_grid_points: 1025
  tdm_sigma_norm_mc_samples: 2000
  tdm_centered_sigma_norm_correction: false
  score_network:
    hidden_dim: 128
    time_dim: 128
    num_layers: 4
    num_freqs: 32
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-12
  amsgrad: true
  foreach: false

ema:
  enabled: false

training:
  max_epochs: 20

logging:
  train_every_epochs: 1
  wandb_checkpoints: false

validation:
  every_n_epochs: 20
  ablation: false
  ablation_num_seeds: 1
  ablation_seed_offset: 0
  ema_val: false
  subset_size: 64
  subset_seed: 123
  sampling_max_graphs: 2

checkpoint:
  resume_from: null
  wandb_resume_id: null

sampling_eval:
  split: test
  batch_size: 2
  num_targets: 2
  subset_seed: 123
  samples_per_target: 1
