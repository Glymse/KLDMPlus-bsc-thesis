experiment_name: mp20_lattice_eps_algorithm6_pcs_eval

sampling:
  checkpoint_path: ../../../artifacts/HPC/checkpoints/epoch_8900.pt
  method: em
  sampling_algorithm: 6
  n_steps: 300
  t_start: 1.0
  t_final: 1e-3
  n_samples: 3
  pcs:
    standardization: conventional
    symprec: 1.0e-2
    angle_tolerance: 5.0
    max_templates: 1028
    template_eval_limit: 64
    template_prior_weight: 1.0
    optimization_steps: 150
    learning_rate: 5.0e-2
    coord_weight: 1.0
    lattice_weight: 0.02
    pairdist_weight: 0.2
    pairdist_bins: 32
    pairdist_max_distance: 8.0
    pairdist_bandwidth: 0.25
    steric_weight: 2.0
    steric_min_distance: 1.0
    quick_templates: false
    top_k_templates: 4
    mala_steps: 5
    mala_step_size: 1.0e-3
    dds_repair: true
    dds_n_steps: 60
    dds_t_final: 1e-3
    outer_steps: 2
    outer_eta_start: 0.02
    outer_eta_end: 0.005
    outer_eta_k_start: 1
    outer_eta_rho: 1.0
    final_projection: false
    validate_requested_space_group: true
    return_last_pcs_on_validation_failure: false

dataset:
  task: csp
  name: mp20
  root: null
  batch_size: 16
  num_workers: 0
  pin_memory: false

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: false
  tdm_velocity_scale: 0.15915494309189535
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true

sampling_eval:
  evaluation: false
  split: test
  batch_size: 8
  num_targets: 7236
  subset_seed: 123
  validity_cutoff: 1.0
