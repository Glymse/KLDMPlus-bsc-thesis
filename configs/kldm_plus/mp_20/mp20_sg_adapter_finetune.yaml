experiment_name: mp20_sg_adapter_finetune_from_8900
sampler_config: ../../samplers/euler_maruyama.yaml

dataset:
  task: csp
  name: mp20
  lattice_representation: kldm
  root: null
  batch_size: 256
  num_workers: 1
  pin_memory: true

time_sampler:
  type: uniform

model:
  eps: 1.0e-6
  lattice_parameterization: eps
  lattice_diffusion_type: VP
  wrapped_normal_K: 3
  tdm_n_sigmas: 2000
  tdm_compute_sigma_norm: true
  tdm_velocity_scale: 0.15915494309189535
  tdm_sigma_norm_estimator: quadrature
  tdm_sigma_norm_density_K: 40
  tdm_sigma_norm_grid_points: 8193
  tdm_sigma_norm_mc_samples: 20000
  tdm_centered_sigma_norm_correction: false
  sg_condition_dropout: 0.2
  score_network:
    hidden_dim: 512
    time_dim: 256
    num_layers: 6
    num_freqs: 128
    ln: true
    h_dim: 100
    smooth: false
    pred_v: true
    pred_l: true
    pred_h: false
    zero_cog: true
    sg_conditional: true
    sg_emb_dim: 512
    num_space_groups: 230

finetune:
  freeze_base: false
  train_sg_adapters_only: false

optimizer:
  lr: 5.0e-6
  weight_decay: 1.0e-6
  amsgrad: true
  foreach: true

ema:
  enabled: true
  type: power
  gamma: 6.94

logging:
  train_every_epochs: 1
  wandb_checkpoints: true
  wandb_project: mp20_sg_adapter_finetune
  wandb_run_name: mp20_sg_adapter_finetune_from_8900

validation:
  every_n_epochs: 20
  ablation: true
  ablation_num_seeds: 4
  ablation_seed_offset: 0
  ema_val: true
  subset_size: 1024
  subset_seed: 123
  sampling_max_graphs: 1024
  sg_conditioned_sampling: true
  sg_guidance_scale: 2.0
  debug_space_group: true
  debug_space_group_max_groups: 32

checkpoint:
  # Accepts local paths or full WandB artifact file URLs.
  resume_from: "https://wandb.ai/xanderbaatz-danmarks-tekniske-universitet-dtu/mp20_lattice_eps_em/artifacts/model/mp20_lattice_eps_em_validation/v91/files/epoch_8900.pt"
  load_optimizer_state: false
  load_ema_state: false
  load_time_sampler_state: false
  # Set this only if you want to resume logging into an existing WandB run.
  wandb_resume_id: null

sampling_eval:
  split: test
  batch_size: 128
  num_targets: 1024
  subset_seed: 123
  samples_per_target: 20
